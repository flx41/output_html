<!DOCTYPE html>

<body>
    <div class="container">

        <p class="subtitle">使用TradingView Lightweight Charts绘制K线图，自动识别价格行为模式</p>
        
        <!-- 股票查询区域 -->
        <div class="search-section">
            <h3>🔍 股票查询</h3>
            <div class="search-form">
                <input type="text" id="stockCode" placeholder="输入股票代码（如：600519）" value="600519">
                <select id="timeframe">
                    <option value="day">日K</option>

            <div id="stockInfo" class="stock-info"></div>
            <div class="watchlist">
                <h4>📌 常用股票（点击快速查询）</h4>
                <div class="watchlist-items">

                <div class="legend-color" style="background: #2196F3;"></div>

            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #FF9800;"></div>
                <span>Pin Bar（看跌）</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #9C27B0;"></div>
                <span>吞没形态</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #2196F3;"></div>
                <span>GMMA短期组</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #f44336;"></div>
                <span>GMMA长期组</span>
            </div>
        </div>
        
        <div class="chart-container">
            <div id="chart"></div>
        </div>
        
        <div class="pattern-info">
            <h3>🔍 识别到的价格行为模式</h3>
            <div id="patternsFound">请先查询股票数据</div>
        </div>
        
        <div class="stats">
            <h3>📈 统计信息</h3>
            <div id="statsInfo">请先查询股票数据</div>
        </div>

        <!-- GMMA 分析面板 -->
        <div class="gmma-panel">
            <h3>📊 顾比均线（GMMA）分析</h3>
            <div id="gmmaInfo">请先查询股票数据</div>
        </div>

        <!-- 综合交易信号 -->
        <div class="signal-panel">
            <h3>🎯 综合交易信号</h3>
            <div id="signalInfo">请先查询股票数据</div>
        </div>

    <script>
        // 全局变量
        let chart = null;
        let candlestickSeries = null;
        let currentData = [];
        let gmmaSeries = []; // GMMA均线系列

        // GMMA 周期设置
        const GMMA_SHORT_PERIODS = [3, 5, 8, 10, 12, 15]; // 短期组
        const GMMA_LONG_PERIODS = [30, 35, 40, 45, 50, 60]; // 长期组

        // 初始化图表
        function initChart() {
            const chartContainer = document.getElementById('chart');
            
            if (chart) {
                chart.remove();
            }
            
            chart = LightweightCharts.createChart(chartContainer, {
                width: chartContainer.clientWidth,
                height: 500,
                layout: {
                    background: { type: 'solid', color: '#ffffff' },
                    textColor: '#333333',
                },
                grid: {
                    vertLines: { color: '#f0f0f0' },
                    horzLines: { color: '#f0f0f0' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                },
                rightPriceScale: {
                    borderColor: '#d1d4dc',
                },
                timeScale: {
                    borderColor: '#d1d4dc',
                    timeVisible: true,
                },
            });

            candlestickSeries = chart.addCandlestickSeries({
                upColor: '#26a69a',
                downColor: '#ef5350',
                borderDownColor: '#ef5350',
                borderUpColor: '#26a69a',
                wickDownColor: '#ef5350',
                wickUpColor: '#26a69a',
            });
        }
        // 日期字符串转 Unix 时间戳（秒）
        function toTimestamp(dateStr) {
            return Math.floor(new Date(dateStr).getTime() / 1000);
        }

        // ========== GMMA 相关函数 ==========

        // 计算 EMA（指数移动平均）
        function calculateEMA(data, period) {
            const ema = [];
            const multiplier = 2 / (period + 1);

            // 第一个EMA值使用SMA
            let sum = 0;
            for (let i = 0; i < period && i < data.length; i++) {
                sum += data[i].close;
            }
            ema[period - 1] = sum / period;

            // 计算后续EMA值
            for (let i = period; i < data.length; i++) {
                ema[i] = (data[i].close - ema[i - 1]) * multiplier + ema[i - 1];
            }

            return ema;
        }

        // 初始化GMMA均线系列
        function initGMMA() {
            // 清除旧的GMMA系列
            gmmaSeries.forEach(series => {
                chart.removeSeries(series);
            });
            gmmaSeries = [];

            // 短期组 - 蓝色系
            const shortColors = ['#E3F2FD', '#BBDEFB', '#90CAF9', '#64B5F6', '#42A5F5', '#2196F3'];
            GMMA_SHORT_PERIODS.forEach((period, index) => {
                const series = chart.addLineSeries({
                    color: shortColors[index],
                    lineWidth: 1,
                    title: `EMA${period}`,
                    visible: document.getElementById('showGMMA').checked
                });
                gmmaSeries.push({ series, period, type: 'short' });
            });

            // 长期组 - 红色系
            const longColors = ['#FFEBEE', '#FFCDD2', '#EF9A9A', '#E57373', '#EF5350', '#f44336'];
            GMMA_LONG_PERIODS.forEach((period, index) => {
                const series = chart.addLineSeries({
                    color: longColors[index],
                    lineWidth: 1,
                    title: `EMA${period}`,
                    visible: document.getElementById('showGMMA').checked
                });
                gmmaSeries.push({ series, period, type: 'long' });
            });
        }

        // 更新GMMA数据
        function updateGMMA(data) {
            gmmaSeries.forEach(({ series, period }) => {
                const ema = calculateEMA(data, period);
                const lineData = [];
                for (let i = period - 1; i < data.length; i++) {
                    if (ema[i] !== undefined) {
                        lineData.push({
                            time: data[i].time,
                            value: ema[i]
                        });
                    }
                }
                series.setData(lineData);
            });
        }

        // 分析GMMA趋势
        function analyzeGMMATrend(data) {
            if (data.length < 60) {
                return { trend: 'neutral', confidence: 0, details: '数据不足，需要至少60条K线' };
            }

            // 计算短期组和长期组的平均值
            const shortEmas = GMMA_SHORT_PERIODS.map(period => calculateEMA(data, period));
            const longEmas = GMMA_LONG_PERIODS.map(period => calculateEMA(data, period));

            const lastIndex = data.length - 1;
            const shortAvg = shortEmas.reduce((sum, ema) => sum + (ema[lastIndex] || 0), 0) / GMMA_SHORT_PERIODS.length;
            const longAvg = longEmas.reduce((sum, ema) => sum + (ema[lastIndex] || 0), 0) / GMMA_LONG_PERIODS.length;

            // 计算短期组内部的发散程度
            const shortValues = shortEmas.map(ema => ema[lastIndex] || 0);
            const shortSpread = Math.max(...shortValues) - Math.min(...shortValues);
            const shortSpreadPercent = (shortSpread / shortAvg) * 100;

            // 计算长期组内部的发散程度
            const longValues = longEmas.map(ema => ema[lastIndex] || 0);
            const longSpread = Math.max(...longValues) - Math.min(...longValues);
            const longSpreadPercent = (longSpread / longAvg) * 100;

            // 判断趋势
            let trend = 'neutral';
            let confidence = 0;
            let details = '';

            if (shortAvg > longAvg * 1.02) {
                trend = 'bullish';
                confidence = Math.min(100, 50 + shortSpreadPercent * 5);
                details = `短期组（${shortAvg.toFixed(2)}）高于长期组（${longAvg.toFixed(2)}），多头排列`;
            } else if (shortAvg < longAvg * 0.98) {
                trend = 'bearish';
                confidence = Math.min(100, 50 + longSpreadPercent * 5);
                details = `短期组（${shortAvg.toFixed(2)}）低于长期组（${longAvg.toFixed(2)}），空头排列`;
            } else {
                details = `短期组（${shortAvg.toFixed(2)}）与长期组（${longAvg.toFixed(2)}）接近，震荡整理`;
            }

            // 检测收敛/发散
            if (shortSpreadPercent < 1 && longSpreadPercent < 1) {
                details += '，均线收敛，可能变盘';
            } else if (shortSpreadPercent > 3 || longSpreadPercent > 3) {
                details += '，均线发散，趋势明确';
            }

            return {
                trend,
                confidence: Math.round(confidence),
                shortAvg,
                longAvg,
                shortSpreadPercent: shortSpreadPercent.toFixed(2),
                longSpreadPercent: longSpreadPercent.toFixed(2),
                details
            };
        }

        // 更新GMMA面板
        function updateGMMAPanel(gmmaAnalysis) {
            const gmmaInfo = document.getElementById('gmmaInfo');
            
            const trendClass = gmmaAnalysis.trend === 'bullish' ? 'trend-bullish' : 
                               gmmaAnalysis.trend === 'bearish' ? 'trend-bearish' : 'trend-neutral';
            const trendText = gmmaAnalysis.trend === 'bullish' ? '多头' : 
                             gmmaAnalysis.trend === 'bearish' ? '空头' : '震荡';

            gmmaInfo.innerHTML = `
                <p>
                    <span class="trend-indicator ${trendClass}">${trendText}</span>
                    <strong>趋势强度:</strong> ${gmmaAnalysis.confidence}%
                </p>
                <p><strong>短期组均价:</strong> ${gmmaAnalysis.shortAvg?.toFixed(2) || 'N/A'}</p>
                <p><strong>长期组均价:</strong> ${gmmaAnalysis.longAvg?.toFixed(2) || 'N/A'}</p>
                <p><strong>短期组发散度:</strong> ${gmmaAnalysis.shortSpreadPercent || 'N/A'}%</p>
                <p><strong>长期组发散度:</strong> ${gmmaAnalysis.longSpreadPercent || 'N/A'}%</p>
                <p><strong>分析:</strong> ${gmmaAnalysis.details}</p>
            `;
        }

        // 综合分析：价格行为 + GMMA
        function generateSignal(patterns, gmmaAnalysis, data) {
            let paScore = 0; // 价格行为得分
            let gmmaScore = 0; // GMMA得分
            let signalType = 'hold';
            let reasons = [];

            // 价格行为分析（权重60%）
            const bullishPatterns = patterns.pinBars.filter(p => p.type === 'bullish').length +
                                   patterns.engulfings.filter(e => e.type === 'bullish').length;
            const bearishPatterns = patterns.pinBars.filter(p => p.type === 'bearish').length +
                                   patterns.engulfings.filter(e => e.type === 'bearish').length;

            if (bullishPatterns > bearishPatterns) {
                paScore = Math.min(100, 50 + (bullishPatterns - bearishPatterns) * 15);
                reasons.push(`价格行为: ${bullishPatterns}个多头信号`);
            } else if (bearishPatterns > bullishPatterns) {
                paScore = Math.max(-100, -50 - (bearishPatterns - bullishPatterns) * 15);
                reasons.push(`价格行为: ${bearishPatterns}个空头信号`);
            } else {
                reasons.push('价格行为: 无明显方向');
            }

            // GMMA分析（权重40%）
            if (gmmaAnalysis.trend === 'bullish') {
                gmmaScore = gmmaAnalysis.confidence;
                reasons.push(`GMMA: 多头排列，强度${gmmaAnalysis.confidence}%`);
            } else if (gmmaAnalysis.trend === 'bearish') {
                gmmaScore = -gmmaAnalysis.confidence;
                reasons.push(`GMMA: 空头排列，强度${gmmaAnalysis.confidence}%`);
            } else {
                reasons.push('GMMA: 震荡整理');
            }

            // 综合得分
            const totalScore = paScore * 0.6 + gmmaScore * 0.4;

            // 判断信号类型
            if (totalScore > 30) {
                signalType = 'buy';
            } else if (totalScore < -30) {
                signalType = 'sell';
            }

            // 计算关键价位
            const latestPrice = data[data.length - 1].close;
            const support1 = Math.min(...data.slice(-20).map(d => d.low));
            const resistance1 = Math.max(...data.slice(-20).map(d => d.high));

            return {
                signalType,
                totalScore: Math.round(totalScore),
                paScore: Math.round(paScore),
                gmmaScore: Math.round(gmmaScore),
                reasons,
                support: support1.toFixed(2),
                resistance: resistance1.toFixed(2),
                currentPrice: latestPrice.toFixed(2)
            };
        }

        // 更新信号面板
        function updateSignalPanel(signal) {
            const signalInfo = document.getElementById('signalInfo');
            
            let signalClass = 'signal-hold';
            let signalText = '观望';
            let scoreClass = 'score-medium';

            if (signal.signalType === 'buy') {
                signalClass = 'signal-buy';
                signalText = '做多';
                scoreClass = signal.totalScore > 60 ? 'score-high' : 'score-medium';
            } else if (signal.signalType === 'sell') {
                signalClass = 'signal-sell';
                signalText = '做空';
                scoreClass = signal.totalScore < -60 ? 'score-low' : 'score-medium';
            }

            signalInfo.innerHTML = `
                <div class="signal-box">
                    <div class="signal-item ${signalClass}">
                        <h4>📊 综合信号</h4>
                        <div class="score ${scoreClass}">${signalText}</div>
                        <p>综合得分: <strong>${signal.totalScore}</strong></p>
                    </div>
                    <div class="signal-item">
                        <h4>📈 价格行为得分</h4>
                        <p>${signal.paScore}</p>
                    </div>
                    <div class="signal-item">
                        <h4>📉 GMMA得分</h4>
                        <p>${signal.gmmaScore}</p>
                    </div>
                    <div class="signal-item">
                        <h4>💰 关键价位</h4>
                        <p>当前价: ${signal.currentPrice}</p>
                        <p>支撑位: ${signal.support}</p>
                        <p>阻力位: ${signal.resistance}</p>
                    </div>
                </div>
                <div style="margin-top: 15px;">
                    <strong>分析依据:</strong>
                    <ul>
                        ${signal.reasons.map(r => `<li>${r}</li>`).join('')}
                    </ul>
                </div>
            `;
        }

        // ========== 数据源1: 新浪财经API (主力) ==========
        async function fetchStockDataSina(code, period = 'day') {
            // 判断市场前缀 (60x/68x=上海, 00x/30x=深圳)
            const prefix = code.startsWith('6') ? 'sh' : 'sz';
            const symbol = `${prefix}${code}`;
            
            // 新浪K线API
            const url = `https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketDataService.getKLineData?symbol=${symbol}&scale=240&ma=no&datalen=100`;
            
            console.log('[Sina] 请求URL:', url);
            
            const response = await fetch(url);
            const text = await response.text();
            
            console.log('[Sina] 响应状态:', response.status);
            console.log('[Sina] 响应内容:', text.substring(0, 200));
            
            // 新浪返回的是JSON数组
            const data = JSON.parse(text);
            
            if (!data || !Array.isArray(data) || data.length === 0) {
                throw new Error('新浪API返回数据为空');
            }
            
            console.log('[Sina] 数据条数:', data.length);
            
            return data.map(k => ({
                time: toTimestamp(k.day),
                open: parseFloat(k.open),
                close: parseFloat(k.close),
                high: parseFloat(k.high),
                low: parseFloat(k.low),
                volume: parseFloat(k.volume) || 0
            }));
        }

        // ========== 数据源2: 腾讯财经API (备用) ==========
        async function fetchStockDataTencent(code, period = 'day') {
            const url = `https://web.ifzq.gtimg.cn/appstock/app/kline/kline?param=sh${code},${period},,,100`;
            
            console.log('[Tencent] 请求URL:', url);
            
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.data && data.data[`sh${code}`]) {
                const stockData = data.data[`sh${code}`];
                const klines = stockData.day || stockData.week || stockData.month || [];
                
                if (klines.length === 0) {
                    throw new Error('腾讯API返回数据为空');
                }
                
                console.log('[Tencent] 数据条数:', klines.length);
                
                return klines.map(k => ({
                    time: toTimestamp(k[0]),
                    open: parseFloat(k[1]),
                    close: parseFloat(k[2]),
                    high: parseFloat(k[3]),
                    low: parseFloat(k[4]),
                    volume: parseFloat(k[5]) || 0
                }));
            }
            throw new Error('腾讯API数据格式异常');
        }

        // ========== 数据源3: 东方财富JSONP (兜底) ==========
        function fetchStockDataEastMoney(code, period = 'day') {
            return new Promise((resolve, reject) => {
                const callbackName = 'stockCallback_' + Date.now();
                
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    if (script.parentNode) script.parentNode.removeChild(script);
                    
                    if (data && data.data && data.data.klines) {
                        const klines = data.data.klines.map(kline => {
                            const [date, open, close, high, low, volume] = kline.split(',');
                            return {
                                time: date,
                                open: parseFloat(open),
                                high: parseFloat(high),
                                low: parseFloat(low),
                                close: parseFloat(close),
                                volume: parseFloat(volume)
                            };
                        });
                        console.log('[EastMoney] 数据条数:', klines.length);
                        resolve(klines);
                    } else {
                        reject(new Error('东方财富API数据格式异常'));
                    }
                };
                
                const secid = code.startsWith('6') ? `1.${code}` : `0.${code}`;
                const url = `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=${secid}&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=1&end=20500101&lmt=100&cb=${callbackName}`;
                
                console.log('[EastMoney] 请求URL:', url);
                
                const script = document.createElement('script');
                script.src = url;
                script.onerror = () => {
                    delete window[callbackName];
                    reject(new Error('东方财富API加载失败'));
                };
                document.head.appendChild(script);
                
                setTimeout(() => {
                    if (window[callbackName]) {
                        delete window[callbackName];
                        if (script.parentNode) script.parentNode.removeChild(script);
                        reject(new Error('东方财富API请求超时'));
                    }
                }, 8000);
            });
        }

        // ========== 统一数据获取接口 (带自动故障切换) ==========
        async function fetchStockData(code, period = 'day') {
            const sources = [
                { name: '新浪财经', fn: fetchStockDataSina },
                { name: '腾讯财经', fn: fetchStockDataTencent },
                { name: '东方财富', fn: fetchStockDataEastMoney }
            ];
            
            let lastError = null;
            
            for (const source of sources) {
                try {
                    console.log(`[数据源] 尝试: ${source.name}`);
                    const data = await source.fn(code, period);
                    
                    if (data && data.length > 0) {
                        console.log(`[数据源] ✅ ${source.name} 成功, ${data.length}条`);
                        return {
                            data: data,
                            source: source.name
                        };
                    }
                } catch (e) {
                    console.log(`[数据源] ❌ ${source.name} 失败: ${e.message}`);
                    lastError = e;
                }
            }
            
            throw new Error(`所有数据源都失败: ${lastError?.message || '未知错误'}`);
        }

        // 价格行为模式识别
        function identifyPinBar(candle) {
            const bodySize = Math.abs(candle.close - candle.open);
            const totalRange = candle.high - candle.low;
            const lowerShadow = Math.min(candle.open, candle.close) - candle.low;
            const upperShadow = candle.high - Math.max(candle.open, candle.close);
            
            if (totalRange === 0) return null;
            
            const isPinBar = bodySize / totalRange < 0.3;
            
            if (isPinBar) {
                if (lowerShadow > bodySize * 2 && upperShadow < bodySize) {
                    return { type: 'bullish', candle };
                }
                if (upperShadow > bodySize * 2 && lowerShadow < bodySize) {
                    return { type: 'bearish', candle };
                }
            }
            return null;
        }

        function identifyEngulfing(current, previous) {
            if (!current || !previous) return null;
            
            if (current.close > current.open &&
                previous.close < previous.open &&
                current.open <= previous.close &&
                current.close >= previous.open) {
                return { type: 'bullish', current, previous };
            }
            
            if (current.close < current.open &&
                previous.close > previous.open &&
                current.open >= previous.close &&
                current.close <= previous.open) {
                return { type: 'bearish', current, previous };
            }
            
            return null;
        }

        function identifyDoji(candle) {
            const bodySize = Math.abs(candle.close - candle.open);
            const totalRange = candle.high - candle.low;
            
            if (totalRange === 0) return false;
            return bodySize / totalRange < 0.1;
        }

        // 分析所有模式
        function analyzePatterns(data) {
            const patterns = {
                pinBars: [],
                engulfings: [],
                dojis: []
            };

            data.forEach((candle, index) => {
                const pinBar = identifyPinBar(candle);
                if (pinBar) {
                    patterns.pinBars.push({ ...pinBar, index });
                }
                
                if (identifyDoji(candle)) {
                    patterns.dojis.push({ candle, index });
                }
                
                if (index > 0) {
                    const engulfing = identifyEngulfing(candle, data[index - 1]);
                    if (engulfing) {
                        patterns.engulfings.push({ ...engulfing, index });
                    }
                }
            });

            return patterns;
        }

        // 添加标记
        function addMarkers(patterns) {
            const markers = [];
            
            if (document.getElementById('showPinBar').checked) {
                patterns.pinBars.forEach(pb => {
                    markers.push({
                        time: pb.candle.time,
                        position: pb.type === 'bullish' ? 'belowBar' : 'aboveBar',
                        color: pb.type === 'bullish' ? '#2196F3' : '#FF9800',
                        shape: pb.type === 'bullish' ? 'arrowUp' : 'arrowDown',
                        text: pb.type === 'bullish' ? 'Pin↑' : 'Pin↓',
                    });
                });
            }
            
            if (document.getElementById('showEngulfing').checked) {
                patterns.engulfings.forEach(e => {
                    markers.push({
                        time: e.current.time,
                        position: e.type === 'bullish' ? 'belowBar' : 'aboveBar',
                        color: '#9C27B0',
                        shape: e.type === 'bullish' ? 'arrowUp' : 'arrowDown',
                        text: e.type === 'bullish' ? '吞↑' : '吞↓',
                    });
                });
            }
            
            if (document.getElementById('showDoji').checked) {
                patterns.dojis.forEach(d => {
                    markers.push({
                        time: d.candle.time,
                        position: 'aboveBar',
                        color: '#607D8B',
                        shape: 'circle',
                        text: 'Doji',
                    });
                });
            }
            
            markers.sort((a, b) => new Date(a.time) - new Date(b.time));
            
            if (document.getElementById('showMarkers').checked) {
                candlestickSeries.setMarkers(markers);
            } else {
                candlestickSeries.setMarkers([]);
            }
        }

        // 更新模式信息
        function updatePatternInfo(patterns) {
            const patternsFound = document.getElementById('patternsFound');
            let html = '';
            
            if (patterns.pinBars.length > 0) {
                html += `<p><strong>📌 Pin Bar:</strong> 发现 ${patterns.pinBars.length} 个</p>`;
                html += '<ul>';
                patterns.pinBars.forEach(pb => {
                    const type = pb.type === 'bullish' ? '看涨（锤子线）' : '看跌（上吊线）';
                    html += `<li>${pb.candle.time} - ${type}</li>`;
                });
                html += '</ul>';
            }
            
            if (patterns.engulfings.length > 0) {
                html += `<p><strong>🔄 吞没形态:</strong> 发现 ${patterns.engulfings.length} 个</p>`;
                html += '<ul>';
                patterns.engulfings.forEach(e => {
                    const type = e.type === 'bullish' ? '看涨吞没' : '看跌吞没';
                    html += `<li>${e.current.time} - ${type}</li>`;
                });
                html += '</ul>';
            }
            
            if (patterns.dojis.length > 0) {
                html += `<p><strong>➕ 十字星:</strong> 发现 ${patterns.dojis.length} 个</p>`;
                html += '<ul>';
                patterns.dojis.forEach(d => {
                    html += `<li>${d.candle.time}</li>`;
                });
                html += '</ul>';
            }
            
            if (!html) {
                html = '<p>未识别到明显的模式</p>';
            }
            
            patternsFound.innerHTML = html;
        }

        // 更新统计信息
        function updateStats(data, patterns) {
            const statsInfo = document.getElementById('statsInfo');
            const totalCandles = data.length;
            const bullishCandles = data.filter(c => c.close > c.open).length;
            const bearishCandles = data.filter(c => c.close < c.open).length;
            
            const avgPrice = data.reduce((sum, c) => sum + c.close, 0) / totalCandles;
            const maxPrice = Math.max(...data.map(c => c.high));
            const minPrice = Math.min(...data.map(c => c.low));
            
            statsInfo.innerHTML = `
                <p>📊 总K线数量: ${totalCandles}</p>
                <p>📈 阳线数量: ${bullishCandles} (${(bullishCandles/totalCandles*100).toFixed(1)}%)</p>
                <p>📉 阴线数量: ${bearishCandles} (${(bearishCandles/totalCandles*100).toFixed(1)}%)</p>
                <p>💰 平均价格: ${avgPrice.toFixed(2)}</p>
                <p>⬆️ 最高价: ${maxPrice.toFixed(2)}</p>
                <p>⬇️ 最低价: ${minPrice.toFixed(2)}</p>
                <p>📌 Pin Bar: ${patterns.pinBars.length} 个</p>
                <p>🔄 吞没形态: ${patterns.engulfings.length} 个</p>
                <p>➕ 十字星: ${patterns.dojis.length} 个</p>
                <p>🎯 价格行为信号总计: ${patterns.pinBars.length + patterns.engulfings.length + patterns.dojis.length} 个</p>
            `;
        }

        // 查询股票
        async function searchStock() {
            const code = document.getElementById('stockCode').value.trim();
            const period = document.getElementById('timeframe').value;
            
            if (!code) {
                alert('请输入股票代码');
                return;
            }
            
            const searchBtn = document.getElementById('searchBtn');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const stockInfo = document.getElementById('stockInfo');
            const patternsFound = document.getElementById('patternsFound');
            const statsInfo = document.getElementById('statsInfo');
            
            searchBtn.disabled = true;
            loadingIndicator.style.display = 'inline-block';
            stockInfo.classList.remove('show');
            patternsFound.innerHTML = '<p class="info">正在获取数据...</p>';
            statsInfo.innerHTML = '<p class="info">正在分析...</p>';
            
            try {
                // fetchStockData 返回 { data: [...], source: '...' }
                const result = await fetchStockData(code, period);
                
                if (!result.data || result.data.length === 0) {
                    throw new Error('未获取到数据，请检查股票代码');
                }
                
                currentData = result.data;
                const dataSourceName = result.source;
                
                // 更新图表
                candlestickSeries.setData(result.data);
                
                // 初始化并更新GMMA
                initGMMA();
                updateGMMA(result.data);
                
                // 分析模式
                const patterns = analyzePatterns(result.data);
                
                // 分析GMMA趋势
                const gmmaAnalysis = analyzeGMMATrend(result.data);
                updateGMMAPanel(gmmaAnalysis);
                
                // 生成综合信号
                const signal = generateSignal(patterns, gmmaAnalysis, result.data);
                updateSignalPanel(signal);
                
                // 添加标记
                addMarkers(patterns);
                
                // 更新信息
                updatePatternInfo(patterns);
                updateStats(result.data, patterns);
                
                // 显示股票信息
                const latestData = result.data[result.data.length - 1];
                const prevData = result.data.length > 1 ? result.data[result.data.length - 2] : latestData;
                const change = ((latestData.close - prevData.close) / prevData.close * 100).toFixed(2);
                
                stockInfo.innerHTML = `
                    <strong>SH.${code}</strong> | 
                    最新价: ${latestData.close.toFixed(2)} | 
                    涨跌幅: ${change}% | 
                    数据量: ${result.data.length}条 | 
                    数据源: ${dataSourceName}
                `;
                stockInfo.classList.add('show');
                stockInfo.style.background = '#e8f5e9';
                
                // 更新常用股票高亮
                document.querySelectorAll('.watchlist-item').forEach(item => {
                    item.classList.remove('active');
                    if (item.dataset.code === code) {
                        item.classList.add('active');
                    }
                });
                
            } catch (error) {
                console.error('查询失败:', error);
                patternsFound.innerHTML = `<div class="error">查询失败: ${error.message}</div>`;
                statsInfo.innerHTML = `<div class="error">无法获取统计数据</div>`;
                stockInfo.innerHTML = `<div class="error">查询失败: ${error.message}</div>`;
                stockInfo.classList.add('show');
                stockInfo.style.background = '#ffebee';
            } finally {
                searchBtn.disabled = false;
                loadingIndicator.style.display = 'none';
            }
        }

        // 事件监听
        document.getElementById('searchBtn').addEventListener('click', searchStock);
        
        document.getElementById('stockCode').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchStock();
            }
        });

        // 常用股票点击
        document.querySelectorAll('.watchlist-item').forEach(item => {
            item.addEventListener('click', () => {
                document.getElementById('stockCode').value = item.dataset.code;
                searchStock();
            });
        });

        // 控制选项变化
        ['showPinBar', 'showEngulfing', 'showDoji', 'showMarkers'].forEach(id => {
            document.getElementById(id).addEventListener('change', () => {
                if (currentData.length > 0) {
                    const patterns = analyzePatterns(currentData);
                    addMarkers(patterns);
                }
            });
        });

        // GMMA显示控制
        document.getElementById('showGMMA').addEventListener('change', (e) => {
            gmmaSeries.forEach(({ series }) => {
                series.applyOptions({ visible: e.target.checked });
            });
        });

        // 响应式调整
        window.addEventListener('resize', () => {
            if (chart) {
                chart.applyOptions({
                    width: document.getElementById('chart').clientWidth,
                });
            }
        });

        // 初始化
        initChart();
        
        // 页面加载完成后自动查询
        window.addEventListener('load', () => {
            searchStock();
        });
    </script>
